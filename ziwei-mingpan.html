<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>紫微命盘</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/iztro/dist/iztro.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f6eedf;--bg2:#efe1c8;--surface:rgba(255,252,244,.82);
  --gold:#b98d3b;--gold2:#8c6a2f;--amber:#d8b16a;
  --purple:#78b69b;--purple2:#6aa98d;--teal:#78b69b;--mint:#b7ded0;--emerald:#78b69b;
  --ink:#2f332f;--text:#3d403b;--muted:#8d8577;--border:rgba(185,141,59,.22);
  --glow:0 18px 42px rgba(126,101,58,.12),0 6px 20px rgba(118,164,150,.14);
  --glass-blur:blur(16px) saturate(1.12);
  --radius:12px;
  --font:'Noto Sans SC','Source Han Sans SC','PingFang SC','Microsoft YaHei',sans-serif;
  --title:'Noto Sans SC','Source Han Sans SC','PingFang SC','Microsoft YaHei',sans-serif;
}
html,body{height:100%;font-family:var(--font);background:var(--bg);color:var(--text);overflow:hidden}
img,canvas,svg{max-width:100%;height:auto}
.nebula-canvas{position:fixed;inset:0;z-index:0;pointer-events:none;width:100%;height:100%;opacity:.88}
.stars{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.45;
  background-image:
  radial-gradient(1px 1px at 12% 18%,rgba(185,141,59,.16),transparent),
  radial-gradient(1px 1px at 28% 72%,rgba(112,169,155,.18),transparent),
  radial-gradient(1.5px 1.5px at 55% 8%,rgba(185,141,59,.14),transparent),
  radial-gradient(1px 1px at 78% 35%,rgba(90,119,112,.12),transparent),
  linear-gradient(90deg,rgba(185,141,59,.035) 1px,transparent 1px),
  linear-gradient(0deg,rgba(185,141,59,.03) 1px,transparent 1px);
  background-size:auto,auto,auto,auto,24px 24px,24px 24px;
  animation:twinkle 10s ease-in-out infinite alternate}
@keyframes twinkle{0%{opacity:.26}100%{opacity:.46}}
.page{display:none;flex-direction:column;height:100vh;height:100dvh;min-height:100svh;position:relative;z-index:1}
.page.active{display:flex}
#page-chat.page.active{overflow:hidden}
.header{text-align:center;padding:20px 16px 12px;border-bottom:1px solid var(--border);
  background:rgba(255,250,238,.76);backdrop-filter:var(--glass-blur);flex-shrink:0}
.header h1{font-family:var(--title);font-size:2.4rem;font-weight:700;color:var(--gold2);
  text-shadow:0 2px 0 rgba(255,255,255,.55);letter-spacing:.3em}
.header .sub{font-size:.75rem;color:var(--muted);letter-spacing:.2em;margin-top:4px}
.header-compact{padding:10px 16px 8px}
.header-compact h1{font-size:1.7rem;letter-spacing:.15em}
.header-compact .sub{font-size:.68rem;margin-top:2px}
.main{flex:1;overflow-y:auto;padding:24px 16px;display:flex;flex-direction:column;align-items:center}
.card{width:100%;max-width:420px;background:var(--surface);border:1px solid rgba(255,255,255,.68);
  border-radius:var(--radius);padding:28px 24px;box-shadow:var(--glow);
  backdrop-filter:var(--glass-blur);position:relative}
.card::before,.card::after{content:'☯';position:absolute;font-size:1rem;color:var(--gold);opacity:.3}
.card::before{top:8px;left:12px}.card::after{top:8px;right:12px}
.form-group{margin-bottom:22px}
.form-group label{display:block;font-size:.9rem;color:var(--gold2);margin-bottom:8px;letter-spacing:.1em}
.form-group input,.form-group select{width:100%;padding:12px 14px;background:rgba(255,252,244,.82);
  border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:var(--font);
  font-size:1rem;outline:none;transition:border-color .3s,box-shadow .3s}
.form-group input:focus,.form-group select:focus{border-color:var(--purple);box-shadow:0 0 12px rgba(120,182,155,.2)}
.form-group select option{background:#fff8ea;color:var(--text)}
.date-row{display:flex;gap:8px}
.date-row select{flex:1;min-width:0}
.btn-primary{width:100%;padding:14px;background:linear-gradient(135deg,var(--purple2),var(--purple));
  border:1px solid var(--gold);border-radius:8px;color:#fff;font-family:var(--title);font-weight:600;
  font-size:1.3rem;letter-spacing:.2em;cursor:pointer;transition:all .3s;margin-top:8px}
.btn-primary:hover{box-shadow:0 0 24px rgba(120,182,155,.3);transform:translateY(-1px)}
.btn-primary:disabled{opacity:.5;cursor:not-allowed;transform:none}
.wish{text-align:center;margin-top:20px;font-size:.85rem;color:var(--muted);
  font-style:italic;letter-spacing:.05em}
.wish span{color:var(--gold2);opacity:.95}
/* Chat page */
.chart-quick-bar{flex-shrink:0;padding:6px 8px;border-bottom:1px solid var(--border);
  background:rgba(255,250,238,.76);backdrop-filter:var(--glass-blur)}
.chart-panel{display:none}
.chart-panel.expanded{display:block;position:fixed;inset:0;z-index:100;padding:52px 12px 12px;
  background:rgba(250,241,222,.9);backdrop-filter:blur(8px);overflow:auto;overscroll-behavior:contain}
.chart-panel.capture-mode{opacity:0;pointer-events:none}
#page-chat.chart-expanded .chart-quick-bar{
  position:fixed;top:0;left:0;right:0;z-index:101;
  background:rgba(255,250,238,.9);backdrop-filter:var(--glass-blur);padding:8px 8px 10px;
  border-bottom:1px solid rgba(185,141,59,.12)}
.chart-panel.expanded .chart-hint{display:block}
.chart-hint{text-align:center;font-size:.75rem;color:var(--muted);margin-bottom:6px}
.chart-toolbar{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
.chart-toolbar button{padding:6px 14px;background:rgba(255,252,244,.72);border:1px solid var(--border);
  border-radius:6px;color:var(--gold2);font-size:.8rem;cursor:pointer;font-family:var(--font);
  backdrop-filter:blur(8px);transition:all .25s}
.chart-toolbar button:hover{border-color:var(--emerald);background:rgba(232,247,239,.86);
  box-shadow:0 8px 18px rgba(104,179,148,.16)}
.chat-main{flex:1;overflow-y:auto;padding:12px 16px 8px;display:flex;flex-direction:column;gap:12px;min-height:0}
.msg{max-width:92%;padding:12px 16px;border-radius:var(--radius);position:relative;
  animation:fadeIn .4s ease;backdrop-filter:blur(12px)}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.msg.user{align-self:flex-end;background:linear-gradient(135deg,rgba(149,205,179,.88),rgba(104,179,148,.78));
  border:1px solid rgba(255,255,255,.65);box-shadow:0 8px 22px rgba(104,179,148,.18);color:#fff}
.msg.assistant{align-self:flex-start;background:rgba(255,252,244,.84);border:1px solid rgba(255,255,255,.75);
  box-shadow:var(--glow),inset 0 1px 0 rgba(255,255,255,.65)}
.msg .role{font-size:.7rem;color:var(--gold2);margin-bottom:6px;letter-spacing:.15em;font-weight:600}
.msg .content{font-size:.92rem;line-height:1.7;word-break:break-word}
.msg .content h1,.msg .content h2,.msg .content h3{color:var(--gold2);margin:10px 0 6px;font-size:1em}
.msg .content p{margin:6px 0}
.msg .content ul,.msg .content ol{margin:6px 0 6px 18px}
.msg .content strong{color:var(--gold2)}
.msg .content img{display:block;max-width:100%;height:auto;object-fit:contain;border-radius:8px}
.msg .time{font-size:.65rem;color:var(--muted);margin-top:8px;text-align:right}
.chart-wrap{text-align:center;margin:0;padding:0;background:transparent;border:none;border-radius:0;overflow:visible;max-height:none}
.chart-wrap .chart-title{font-family:var(--title);font-weight:600;color:var(--gold2);font-size:1.1rem;margin-bottom:8px;
  text-shadow:0 1px 0 rgba(255,255,255,.55)}
.chart-scale-wrap{width:100%;overflow:hidden;display:flex;justify-content:center;height:auto}
.pan-board{width:100%;min-width:760px;max-width:920px;margin:0 auto;
  background:linear-gradient(135deg,rgba(185,141,59,.22),rgba(120,182,155,.2));
  padding:4px;border-radius:10px;box-shadow:var(--glow);
  transition:transform .2s ease}
.pan-grid{display:grid;grid-template-columns:repeat(4,1fr);grid-template-rows:repeat(4,minmax(145px,auto));gap:4px}
.pan-cell{background:linear-gradient(160deg,rgba(255,252,244,.94),rgba(238,248,241,.9));padding:8px 7px;height:100%;min-height:145px;
  display:flex;flex-direction:column;text-align:left;border:1px solid rgba(185,141,59,.16)}
.pan-cell-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;padding-bottom:5px;
  border-bottom:1px solid rgba(201,162,39,.2)}
.pan-cell-name{font-size:13px;font-weight:700;color:var(--gold2)}
.pan-cell-gz{font-size:11px;color:var(--muted)}
.pan-main{flex:1;display:flex;flex-direction:column;gap:3px;margin-bottom:5px}
.pan-main .star{font-size:12px;font-weight:600;line-height:1.4}
.pan-aux{display:grid;grid-template-columns:1fr 1fr;gap:2px 6px;margin-top:auto}
.pan-aux .star{font-size:10px;line-height:1.35;color:#5f9b8b}
.pan-foot{font-size:9px;color:#8d8577;margin-top:4px;text-align:right}
.pan-center{grid-row:2/4;grid-column:2/4;background:linear-gradient(135deg,rgba(255,248,232,.96),rgba(226,243,235,.94));
  display:flex;flex-direction:column;align-items:center;justify-content:center;padding:12px;text-align:center;
  border:1px solid rgba(185,141,59,.16)}
.pan-center h3{font-family:var(--title);font-weight:600;font-size:1.5rem;color:var(--gold2);margin-bottom:8px}
.pan-center p{font-size:11px;color:var(--muted);line-height:1.65;margin:3px 0}
.pan-center .sihua{font-size:10px;color:#5f9b8b;margin-top:8px;line-height:1.55;opacity:.95}
.chart-panel.expanded .pan-board{max-width:980px;min-width:820px}
.chart-panel.expanded .pan-grid{grid-template-rows:repeat(4,minmax(165px,auto))}
.chart-panel.expanded .pan-cell{min-height:165px}
.chart-panel.expanded .pan-main .star{font-size:13px}
.chart-panel.expanded .pan-aux .star{font-size:11px}
.star-main{color:var(--ink)}
.star-hua{color:#b98d3b}
.star-ji{color:#ff7b9c}
.star-aux{color:#5f9b8b}
.btn-save-chart{margin-top:10px;padding:6px 16px;background:transparent;border:1px solid var(--border);
  border-radius:6px;color:var(--gold);font-size:.8rem;cursor:pointer;letter-spacing:.1em;transition:all .2s}
.btn-save-chart:hover{background:rgba(120,182,155,.16);box-shadow:0 8px 18px rgba(104,179,148,.16)}
.input-bar{display:flex;gap:8px;padding:10px 16px;border-top:1px solid rgba(185,141,59,.12);
  background:rgba(255,250,238,.78);backdrop-filter:var(--glass-blur);flex-shrink:0;align-items:flex-end}
.btn-clear{width:40px;height:40px;flex-shrink:0;background:rgba(255,252,244,.76);
  border:1px solid var(--border);border-radius:8px;color:var(--muted);cursor:pointer;
  font-size:1.1rem;transition:all .2s}
.btn-clear:hover{color:var(--gold2);border-color:var(--emerald);box-shadow:0 8px 16px rgba(104,179,148,.13)}
.input-bar textarea{flex:1;padding:10px 12px;background:rgba(255,252,244,.84);border:1px solid var(--border);
  border-radius:8px;color:var(--text);font-family:var(--font);font-size:.9rem;resize:none;
  min-height:40px;max-height:100px;outline:none}
.input-bar textarea:focus{border-color:var(--emerald);box-shadow:0 0 0 4px rgba(120,182,155,.16)}
.btn-send{width:40px;height:40px;flex-shrink:0;background:linear-gradient(135deg,var(--purple2),var(--purple));
  border:1px solid var(--gold);border-radius:8px;color:#fff;cursor:pointer;font-size:1rem;
  box-shadow:0 8px 18px rgba(104,179,148,.28)}
.footer-bar{padding:10px 16px 16px;text-align:center;flex-shrink:0}
.btn-back{padding:10px 32px;background:rgba(255,252,244,.7);border:1px solid var(--border);border-radius:8px;
  color:var(--muted);font-family:var(--font);cursor:pointer;transition:all .3s;letter-spacing:.1em;
  backdrop-filter:blur(8px)}
.btn-back:hover{color:var(--gold2);border-color:var(--emerald);box-shadow:0 8px 16px rgba(104,179,148,.14)}
.loading{display:inline-block;width:16px;height:16px;border:2px solid var(--border);
  border-top-color:var(--emerald);border-radius:50%;animation:spin .8s linear infinite;margin-left:8px}
@keyframes spin{to{transform:rotate(360deg)}}
@media (max-width:640px){
  .chart-panel.expanded{padding:50px max(6px,env(safe-area-inset-right)) max(10px,env(safe-area-inset-bottom)) max(6px,env(safe-area-inset-left))}
  .chart-hint{font-size:.68rem;margin-bottom:5px}
  .chart-wrap .chart-title{font-size:1rem;margin-bottom:6px}
  .chart-scale-wrap{overflow:visible}
  .pan-board,.chart-panel.expanded .pan-board{
    width:100%;
    min-width:0;
    max-width:100%;
    padding:3px;
    border-radius:8px;
  }
  .pan-grid,.chart-panel.expanded .pan-grid{
    grid-template-rows:repeat(4,auto);
    gap:3px;
  }
  .pan-cell,.chart-panel.expanded .pan-cell{
    height:auto;
    min-height:clamp(92px,25vw,145px);
    padding:clamp(4px,1.5vw,7px);
  }
  .pan-cell-head{margin-bottom:4px;padding-bottom:4px}
  .pan-cell-name{font-size:clamp(10px,3vw,13px)}
  .pan-cell-gz{font-size:clamp(8px,2.4vw,11px)}
  .pan-main{gap:2px;margin-bottom:4px}
  .pan-main .star,.chart-panel.expanded .pan-main .star{
    font-size:clamp(9px,2.7vw,12px);
    line-height:1.28;
  }
  .pan-aux{gap:1px 4px}
  .pan-aux .star,.chart-panel.expanded .pan-aux .star{
    font-size:clamp(7px,2.2vw,10px);
    line-height:1.22;
  }
  .pan-foot{font-size:clamp(7px,2vw,9px)}
  .pan-center{padding:clamp(6px,2vw,12px)}
  .pan-center h3{font-size:clamp(1rem,4.2vw,1.5rem);margin-bottom:5px}
  .pan-center p{font-size:clamp(8px,2.4vw,11px);line-height:1.45;margin:2px 0}
  .pan-center .sihua{font-size:clamp(7px,2.2vw,10px);margin-top:5px;line-height:1.35}
}
@media (prefers-reduced-motion:reduce){
  .nebula-canvas{display:none}
  body{background:
    radial-gradient(ellipse 80% 50% at 72% 12%,rgba(159,207,196,.38),transparent),
    radial-gradient(ellipse 55% 42% at 48% 18%,rgba(217,188,121,.3),transparent),
    radial-gradient(ellipse 50% 55% at 88% 38%,rgba(154,199,213,.24),transparent),
    var(--bg)}
}
</style>
</head>
<body>
<canvas id="nebulaCanvas" class="nebula-canvas"></canvas>
<div class="stars"></div>

<!-- 信息收集页 -->
<div id="page-input" class="page active">
  <header class="header">
    <h1>紫微命盘</h1>
    <div class="sub">观星象 · 知命理 · 探玄机</div>
  </header>
  <main class="main">
    <div class="card">
      <div class="form-group">
        <label>出生年份</label>
        <select id="birthYear"></select>
      </div>
      <div class="form-group">
        <label>出生月份</label>
        <select id="birthMonth"></select>
      </div>
      <div class="form-group">
        <label>出生日期</label>
        <select id="birthDay"></select>
      </div>
      <div class="form-group">
        <label>出生时辰</label>
        <select id="birthHour">
          <option value="0">子时 (23:00-01:00)</option>
          <option value="2">丑时 (01:00-03:00)</option>
          <option value="4">寅时 (03:00-05:00)</option>
          <option value="6">卯时 (05:00-07:00)</option>
          <option value="8">辰时 (07:00-09:00)</option>
          <option value="10">巳时 (09:00-11:00)</option>
          <option value="12" selected>午时 (11:00-13:00)</option>
          <option value="14">未时 (13:00-15:00)</option>
          <option value="16">申时 (15:00-17:00)</option>
          <option value="18">酉时 (17:00-19:00)</option>
          <option value="20">戌时 (19:00-21:00)</option>
          <option value="22">亥时 (21:00-23:00)</option>
        </select>
      </div>
      <div class="form-group">
        <label>性别</label>
        <select id="gender">
          <option value="男">男</option>
          <option value="女">女</option>
        </select>
      </div>
      <button class="btn-primary" id="btnConfirm">确认排盘</button>
    </div>
    <p class="wish">祝在座的各位<span>年薪100万</span></p>
  </main>
</div>

<!-- 模型对话页 -->
<div id="page-chat" class="page">
  <header class="header header-compact">
    <h1>紫微命盘</h1>
    <div class="sub">天机已启 · 命途可询</div>
  </header>
  <div class="chart-quick-bar" id="chartQuickBar">
    <div class="chart-toolbar">
      <button type="button" id="btnExpandChart">⛶ 展开命盘</button>
      <button type="button" id="btnSaveChart">⬇ 保存图片</button>
      <button type="button" id="btnViewAnalysis">↓ 查看解析</button>
    </div>
  </div>
  <div class="chart-panel" id="chartPanel">
    <p class="chart-hint" id="chartHint">左右滑动可查看完整命盘 · 点击「查看解析」阅读运势</p>
    <div class="chart-wrap" id="chartWrap"></div>
  </div>
  <div class="chat-main" id="chatArea"></div>
  <div class="input-bar">
    <button class="btn-clear" id="btnClear" title="清除输入">✕</button>
    <textarea id="chatInput" rows="1" placeholder="向紫微大师提问…"></textarea>
    <button class="btn-send" id="btnSend" title="发送">➤</button>
  </div>
  <div class="footer-bar">
    <button class="btn-back" id="btnBack">← 返回重新输入</button>
  </div>
</div>

<script>
// ========== 紫微排盘（三合派 · iztro） ==========
const PALACE_ORDER = ['命宫','兄弟','夫妻','子女','财帛','疾厄','迁移','交友','官禄','田宅','福德','父母'];
const PALACE_ALIAS = {仆役:'交友'};
const DIFY_BASE_URL = 'https://api.dify.ai/v1';
const DIFY_API_KEY = 'app-zrfnVR5rcBnMjeSYoTmWXitp';

// 三合盘：每宫固定 grid-area（行/列）
const BRANCH_POS={
  '巳':'1/1','午':'1/2','未':'1/3','申':'1/4',
  '辰':'2/1','酉':'2/4',
  '卯':'3/1','戌':'3/4',
  '寅':'4/1','丑':'4/2','子':'4/3','亥':'4/4'
};

function hourToTimeIndex(h){return h===23?12:Math.floor((h+1)/2)}

function fmtStar(s){
  let n=s.name;
  if(s.brightness)n+=`(${s.brightness})`;
  if(s.mutagen)n+=s.mutagen;
  return n;
}

function starClass(name){
  if(/忌/.test(name))return 'star-ji';
  if(/禄|权|科/.test(name))return 'star-hua';
  return 'star-main';
}

const KEY_AUX=new Set(['左辅','右弼','文昌','文曲','天魁','天钺','禄存','擎羊','陀罗','火星','铃星','天马','地空','地劫','红弼','红鸾','天喜','天刑','天姚','天巫','天月','阴煞','天伤','天使']);

function normalizePalace(p, forChart){
  const main=p.majorStars.map(fmtStar);
  const allAux=[...p.minorStars.map(fmtStar),...p.adjectiveStars.map(fmtStar)];
  const aux=forChart?allAux.filter(s=>KEY_AUX.has(s.replace(/\(.+\)/,'').replace(/[禄权科忌]/,'')))
    .concat(allAux.filter(s=>/禄|权|科|忌/.test(s))):allAux;
  const misc=[p.changsheng12,p.boshi12,p.jiangqian12,p.suiqian12].filter(Boolean);
  return {
    name:PALACE_ALIAS[p.name]||p.name,
    branch:p.earthlyBranch,
    stem:p.heavenlyStem,
    gz:p.heavenlyStem+p.earthlyBranch,
    main,aux:aux.slice(0,forChart?8:99),
    changsheng:p.changsheng12||'',
    misc,
    stars:[...main,...allAux,...misc]
  };
}

function calcChart(birthDate, gender){
  const y=birthDate.getFullYear(), mo=birthDate.getMonth()+1, d=birthDate.getDate();
  const ti=hourToTimeIndex(birthDate.getHours());
  const raw=iztro.astro.bySolar(`${y}-${mo}-${d}`, ti, gender, true, 'zh-CN');

  const allPalaces=raw.palaces.map(p=>normalizePalace(p,false));
  const palaces=PALACE_ORDER.map(n=>allPalaces.find(p=>p.name===n)).filter(Boolean);

  const branchMap={};
  raw.palaces.forEach(p=>{branchMap[p.earthlyBranch]=normalizePalace(p,true)});

  const sihuaStr=raw.palaces.flatMap(p=>[...p.majorStars,...p.minorStars,...p.adjectiveStars])
    .filter(s=>s.mutagen).map(s=>s.name+'化'+s.mutagen).join('、');

  return {
    raw, palaces, branchMap, gender,
    juName:raw.fiveElementsClass,
    lunarStr:raw.lunarDate,
    yearGZ:raw.chineseDate,
    hourBranch:raw.time,
    sihuaStr,
    birthStr:`${y}年${mo}月${d}日 ${raw.time}`,
    soul:raw.soul, body:raw.body
  };
}

function renderPalaceCell(p, area){
  const mainHtml=p.main.length
    ? p.main.map(s=>`<div class="star ${starClass(s)}">${s}</div>`).join('')
    : '<div class="star" style="color:#666;font-size:10px">无主星</div>';
  const auxHtml=p.aux.map(s=>`<span class="star star-aux">${s}</span>`).join('');
  return `<div class="pan-cell" style="grid-area:${area}">
    <div class="pan-cell-head">
      <span class="pan-cell-name">${p.name}</span>
      <span class="pan-cell-gz">${p.gz}</span>
    </div>
    <div class="pan-main">${mainHtml}</div>
    ${p.aux.length?`<div class="pan-aux">${auxHtml}</div>`:''}
    ${p.changsheng?`<div class="pan-foot">${p.changsheng}</div>`:''}
  </div>`;
}

function renderChartBoard(chart){
  let cells='';
  Object.entries(BRANCH_POS).forEach(([branch,area])=>{
    const p=chart.branchMap[branch];
    if(p)cells+=renderPalaceCell(p,area);
  });
  const center=`<div class="pan-center" style="grid-area:2/2/4/4">
    <h3>紫微斗数命盘</h3>
    <p>${chart.lunarStr}</p>
    <p>${chart.gender} · ${chart.juName}</p>
    <p>${chart.yearGZ}</p>
    <p>${chart.birthStr}</p>
    <p>命主 ${chart.soul||'—'} · 身主 ${chart.body||'—'}</p>
    <p class="sihua">四化：${chart.sihuaStr}</p>
  </div>`;
  return `<div class="chart-scale-wrap" id="chartScaleWrap"><div class="pan-board" id="panBoard"><div class="pan-grid">${cells}${center}</div></div></div>`;
}

function setChartExpanded(expanded,{silent=false,scrollToChat=false}={}){
  const panel=document.getElementById('chartPanel');
  const page=document.getElementById('page-chat');
  panel.classList.toggle('expanded',expanded);
  page.classList.toggle('chart-expanded',expanded);
  document.getElementById('btnExpandChart').textContent=expanded?'✕ 收起命盘':'⛶ 展开命盘';
  if(expanded){
    const board=document.getElementById('panBoard');
    if(board)board.style.transform='';
    const wrap=document.getElementById('chartScaleWrap');
    if(wrap)wrap.style.height='';
    panel.scrollTop=0;
  }else if(!silent){
    showAnalysis();
    if(scrollToChat){
      requestAnimationFrame(()=>{
        document.getElementById('chatArea').scrollIntoView({behavior:'smooth',block:'start'});
      });
    }
  }
}

async function startChat(){
  const chartWrap=document.getElementById('chartWrap');
  const area=document.getElementById('chatArea');
  chartWrap.innerHTML='<div class="chart-title">✦ 三合命盘 ✦</div>'+renderChartBoard(chartData);
  area.innerHTML='';
  analysisShown=false;
  difyConversationId='';

  chatHistory=[{role:'system',content:buildSystemPrompt()}];
}

async function showAnalysis(){
  if(analysisShown)return;
  analysisShown=true;
  const loadingDiv=addMessage('assistant','正在解析，施主请稍等<span class="loading"></span>',true);
  try{
    const reply=await callDify(buildAnalysisQuery(),{forAnalysis:true});
    chatHistory.push({role:'assistant',content:reply});
    loadingDiv.querySelector('.content').innerHTML=marked.parse(reply);
    loadingDiv.querySelector('.time').textContent=fmtTime();
  }catch(e){
    const errorMsg=`Agent 暂时连接失败，请稍后重试。\n\n> 错误：${e.message}`;
    chatHistory.push({role:'assistant',content:errorMsg});
    loadingDiv.querySelector('.content').innerHTML=marked.parse(errorMsg);
    loadingDiv.querySelector('.time').textContent=fmtTime();
  }
}

function setupChartControls(){
  const panel=document.getElementById('chartPanel');
  const page=document.getElementById('page-chat');
  document.getElementById('btnExpandChart').addEventListener('click',()=>{
    const expanded=!panel.classList.contains('expanded');
    setChartExpanded(expanded,{scrollToChat:!expanded});
  });
  document.getElementById('btnViewAnalysis').addEventListener('click',()=>{
    setChartExpanded(false,{scrollToChat:true});
  });
  document.getElementById('btnSaveChart').addEventListener('click',async()=>{
    const board=document.getElementById('panBoard');
    const btn=document.getElementById('btnSaveChart');
    if(!board||!window.html2canvas)return;
    const wasExpanded=panel.classList.contains('expanded');
    btn.disabled=true;btn.textContent='生成中…';
    try{
      if(!wasExpanded){
        panel.classList.add('expanded','capture-mode');
        page.classList.add('chart-expanded');
        await new Promise(r=>requestAnimationFrame(()=>requestAnimationFrame(r)));
      }
      const canvas=await html2canvas(board,{backgroundColor:'#f6eedf',scale:2});
      const a=document.createElement('a');
      a.download=`紫微命盘_${chartData.birthStr.slice(0,4)}.png`;
      a.href=canvas.toDataURL('image/png');
      a.click();
    }finally{
      btn.disabled=false;btn.textContent='⬇ 保存图片';
      if(!wasExpanded){
        panel.classList.remove('expanded','capture-mode');
        page.classList.remove('chart-expanded');
        document.getElementById('btnExpandChart').textContent='⛶ 展开命盘';
      }
    }
  });
}

function getPalace(chart,name){
  return chart.palaces.find(p=>p.name===name);
}

const PALACE_IDX=Object.fromEntries(PALACE_ORDER.map((n,i)=>[n,i]));
const OPPOSITE={}; // 对宫
PALACE_ORDER.forEach((n,i)=>{OPPOSITE[n]=PALACE_ORDER[(i+6)%12]});

function getSanFang(chart,name){
  const i=PALACE_IDX[name];
  return [0,4,8].map(o=>getPalace(chart,PALACE_ORDER[(i+o)%12])).filter(Boolean);
}

function getSiZheng(chart,name){
  const i=PALACE_IDX[name];
  return getPalace(chart,PALACE_ORDER[(i+6)%12]);
}

function stripStar(s){return s.replace(/\(.+?\)/g,'').replace(/[禄权科忌]/g,'')}

function findMutagens(chart){
  const m={禄:[],权:[],科:[],忌:[]};
  chart.raw.palaces.forEach(p=>{
    [...p.majorStars,...p.minorStars,...p.adjectiveStars].forEach(s=>{
      if(s.mutagen&&m[s.mutagen])m[s.mutagen].push({star:s.name,palace:PALACE_ALIAS[p.name]||p.name});
    });
  });
  return m;
}

function analyzeBrightness(starStr){
  const m=starStr.match(/\((.+?)\)/);
  if(!m)return '';
  const b=m[1];
  if(/庙|旺|得|利/.test(b))return `「${stripStar(starStr)}」处于${b}位，星力发挥较佳`;
  if(/平/.test(b))return `「${stripStar(starStr)}」处于平位，吉凶参半`;
  if(/陷|不/.test(b))return `「${stripStar(starStr)}」处于${b}位，星力受限，宜谨慎应对`;
  return '';
}

function analyzePalaceDetail(p,chart){
  if(!p)return {config:'数据缺失',points:['该宫数据未能读取']};
  const opp=getSiZheng(chart,p.name);
  const lines=[];
  const mainNames=p.main.map(stripStar);
  const configParts=[`${p.name}（${p.branch}宫 · ${p.gz}）`];
  if(mainNames.length){
    configParts.push(`主星：**${p.main.join('、')}**`);
  }else{
    configParts.push(`主星：**空宫**（借对宫 ${opp?.name||'—'} · ${opp?.branch||'—'}宫：${opp?.main?.join('、')||'无主星'}）`);
  }
  if(p.aux.length)configParts.push(`辅星：${p.aux.join('、')}`);
  if(p.changsheng)configParts.push(`${p.changsheng}`);
  const config=configParts.join(' · ');

  if(!mainNames.length&&opp?.main?.length){
    lines.push(`空宫无正曜，须借对宫 **${opp.name}** 之力，外在表现常带迁移/对宫特质，人生际遇与外界环境关联更深。`);
    opp.main.map(stripStar).forEach(n=>{
      const t=MAIN_STAR_TRAITS[n];
      if(t)lines.push(`借星 **${n}**：${t.trait}`);
    });
  }else{
    mainNames.forEach((n,i)=>{
      const raw=p.main[i];
      const t=MAIN_STAR_TRAITS[n];
      if(t){
        lines.push(`**${raw}**：${t.trait}。适宜方向：${t.career}。注意：${t.warn}`);
      }
      const br=analyzeBrightness(raw);
      if(br)lines.push(br);
      if(/禄/.test(raw))lines.push(`→ 化禄坐守，该宫所主事项易有收获与顺遂之机。`);
      if(/权/.test(raw))lines.push(`→ 化权坐守，该领域掌控力增强，宜主动争取主导。`);
      if(/科/.test(raw))lines.push(`→ 化科坐守，名声口碑佳，利考试、文书与公众形象。`);
      if(/忌/.test(raw))lines.push(`→ 化忌坐守，此宫为人生课题所在，宜正视而非回避，反能化险为夷。`);
    });
  }

  p.aux.map(stripStar).forEach(n=>{
    if(AUX_TRAITS[n])lines.push(`**${n}**：${AUX_TRAITS[n]}`);
  });

  const cs=(p.changsheng||'').replace(/神$/,'');
  if(cs&&CHANGSHENG_TRAITS[cs])lines.push(`**${p.changsheng}**：${CHANGSHENG_TRAITS[cs]}`);

  return {config,points:lines.length?lines:['此宫星曜组合平和，以守正稳健为主，随大限流年引动而显化。']};
}

function analyzeSanFangBrief(chart,name){
  const sf=getSanFang(chart,name);
  const dg=getSiZheng(chart,name);
  const summary=sf.map(p=>{
    const m=p.main.length?p.main.slice(0,2).join('、'):`空（借${getSiZheng(chart,p.name)?.main?.[0]||'—'}）`;
    return `${p.name}(${p.branch})：${m}`;
  }).join('；');
  const dgStr=dg?`${dg.name}(${dg.branch})：${dg.main.length?dg.main.slice(0,2).join('、'):'空宫'}`:'';
  return `三方：${summary}。对宫：${dgStr}。`;
}

function sihuaSection(m){

// ========== UI 逻辑 ==========
let userData=null, chartData=null, chatHistory=[], analysisShown=false, difyConversationId='';

function fmtTime(d=new Date()){
  return d.toLocaleString('zh-CN',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});
}

function addMessage(role, content, isHtml=false){
  const area=document.getElementById('chatArea');
  const div=document.createElement('div');
  div.className=`msg ${role}`;
  const rendered=role==='assistant'&&!isHtml?marked.parse(content):content;
  div.innerHTML=`<div class="role">${role==='user'?'🧑 用户':'🔮 紫微大师'}</div>
    <div class="content">${rendered}</div><div class="time">${fmtTime()}</div>`;
  area.appendChild(div);
  area.scrollTop=area.scrollHeight;
  return div;
}

function showPage(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function getDifyUserId(){
  let id=localStorage.getItem('ziwei_dify_user');
  if(!id){
    id='ziwei-'+Date.now()+'-'+Math.random().toString(16).slice(2);
    localStorage.setItem('ziwei_dify_user',id);
  }
  return id;
}

  if(!chartData)return '';
  const stars=chartData.palaces.map(p=>{
    const m=p.main.join('、')||'空';
    const a=p.aux.join('、')||'无';
    const x=p.misc.join('、')||'无';
    return `${p.name}(${p.branch}宫/${p.gz}): 主星[${m}] 辅星[${a}] 神煞[${x}] 长生[${p.changsheng||'无'}]`;
  }).join('\n');
  return `用户出生信息：${chartData.birthStr}，${chartData.gender}，${chartData.lunarStr}，${chartData.juName}。
四柱/干支：${chartData.yearGZ}
命主：${chartData.soul||'—'}；身主：${chartData.body||'—'}
生年四化：${chartData.sihuaStr||'—'}
十二宫星曜：
${stars}`;
}

不要使用外部排盘方式，不要改变命盘数据，只基于下面的排盘结果解读。

function buildFollowUpQuery(question){
  if(difyConversationId)return question;
  return `请按照你在 Dify Web App 中配置的默认角色、语气和表达风格回答用户问题。以下是前端已经排好的命盘数据，请只基于这份命盘继续解读。

${buildChartContext()}

用户问题：${question}`;
}

function buildDifyInputs(forAnalysis){
  const birth=userData?.birth;
  const year=birth?String(birth.getFullYear()):'';
  const month=birth?String(birth.getMonth()+1):'';
  const day=birth?String(birth.getDate()):'';
  const hour=chartData?.hourBranch||'';
  const gender=chartData?.gender||userData?.gender||'';
  return {
    year,
    month,
    day,
    hour,
    gender,
    sex:gender,
    date:birth?`${year}-${month.padStart(2,'0')}-${day.padStart(2,'0')}`:'',
    birth_date:birth?`${year}-${month.padStart(2,'0')}-${day.padStart(2,'0')}`:'',
    birth_time:hour,
    birth_info: chartData?`${chartData.birthStr}，${gender}，${chartData.lunarStr}，${chartData.juName}`:'',
    chart_context: buildChartContext(),
    request_type: forAnalysis?'natal_chart_analysis':'follow_up_chat'
  };
}

async function callDify(query,{forAnalysis=false}={}){
  const body={
    inputs:buildDifyInputs(forAnalysis),
    query,
    response_mode:'streaming',
    user:getDifyUserId()
  };
  if(difyConversationId)body.conversation_id=difyConversationId;

  const res=await fetch(`${DIFY_BASE_URL}/chat-messages`,{
    method:'POST',
    headers:{
      'Authorization':`Bearer ${DIFY_API_KEY}`,
      'Content-Type':'application/json'
    },
    body:JSON.stringify(body)
  });

  if(!res.ok){
    const errText=await res.text().catch(()=>'');
    throw new Error(`Dify 请求失败 (${res.status}) ${errText}`.trim());
  }
  const reader=res.body?.getReader();
  if(!reader)throw new Error('浏览器不支持读取 Agent 流式响应');

  const decoder=new TextDecoder('utf-8');
  let buffer='', answer='';
  while(true){
    const {done,value}=await reader.read();
    if(done)break;
    buffer+=decoder.decode(value,{stream:true});
    const chunks=buffer.split('\n\n');
    buffer=chunks.pop()||'';
    chunks.forEach(chunk=>{
      const line=chunk.split('\n').find(l=>l.startsWith('data:'));
      if(!line)return;
      const payload=line.replace(/^data:\s*/,'').trim();
      if(!payload||payload==='[DONE]')return;
      try{
        const data=JSON.parse(payload);
        if(data.conversation_id)difyConversationId=data.conversation_id;
        if(data.event==='message'||data.event==='agent_message'){
          answer+=data.answer||'';
        }
        if(data.event==='message_end'&&data.conversation_id){
          difyConversationId=data.conversation_id;
        }
        if(data.event==='error'){
          throw new Error(data.message||'Agent 流式响应错误');
        }
      }catch(e){
        if(e instanceof SyntaxError)return;
        throw e;
      }
    });
  }
  return answer.trim()||'Agent 暂无回复，请稍后再试。';
}

async function callModel(messages){
  const question=messages[messages.length-1].content;
  return callDify(buildFollowUpQuery(question));
}

async function sendMessage(){
  const input=document.getElementById('chatInput');
  const text=input.value.trim();
  if(!text)return;
  input.value='';
  addMessage('user', marked.parse(text));
  chatHistory.push({role:'user',content:text});

  const loadingDiv=addMessage('assistant','正在推演天机…<span class="loading"></span>',true);
  try{
    const msgs=[...chatHistory];
    const reply=await callModel(msgs);
    chatHistory.push({role:'assistant',content:reply});
    loadingDiv.querySelector('.content').innerHTML=marked.parse(reply);
    loadingDiv.querySelector('.time').textContent=fmtTime();
  }catch(e){
    loadingDiv.querySelector('.content').innerHTML=marked.parse('抱歉，天机难测，请稍后再试。\n\n'+e.message);
  }
}

function daysInMonth(y,m){return new Date(y,m,0).getDate()}

function updateDayOptions(keepDay){
  const y=+document.getElementById('birthYear').value;
  const m=+document.getElementById('birthMonth').value;
  const daySel=document.getElementById('birthDay');
  const cur=keepDay??(+daySel.value||1);
  const max=daysInMonth(y,m);
  daySel.innerHTML='';
  for(let d=1;d<=max;d++){
    const opt=document.createElement('option');
    opt.value=d;opt.textContent=d+'日';
    if(d===Math.min(cur,max))opt.selected=true;
    daySel.appendChild(opt);
  }
}

function initDateSelectors(){
  const yearSel=document.getElementById('birthYear');
  const monthSel=document.getElementById('birthMonth');
  for(let y=1940;y<=2025;y++){
    const opt=document.createElement('option');
    opt.value=y;opt.textContent=y+'年';
    if(y===1996)opt.selected=true;
    yearSel.appendChild(opt);
  }
  for(let m=1;m<=12;m++){
    const opt=document.createElement('option');
    opt.value=m;opt.textContent=m+'月';
    if(m===7)opt.selected=true;
    monthSel.appendChild(opt);
  }
  updateDayOptions(3);
  yearSel.addEventListener('change',()=>updateDayOptions());
  monthSel.addEventListener('change',()=>updateDayOptions());
}

function getBirthDate(){
  const y=+document.getElementById('birthYear').value;
  const m=+document.getElementById('birthMonth').value;
  const d=+document.getElementById('birthDay').value;
  const h=+document.getElementById('birthHour').value;
  return new Date(y,m-1,d,h,0,0);
}

// Events
function initNebula(){
  const canvas=document.getElementById('nebulaCanvas');
  if(!canvas||window.matchMedia('(prefers-reduced-motion: reduce)').matches)return;
  const ctx=canvas.getContext('2d');
  let w,h,t=0;
  const blobs=[
    {x:.78,y:.16,r:.50,c1:'#9fcfc4',c2:'#d9efe8',ax:.014,ay:.009,sp:.22},
    {x:.46,y:.12,r:.42,c1:'#d9bc79',c2:'#fff1c8',ax:.010,ay:.012,sp:.18},
    {x:.88,y:.36,r:.38,c1:'#9ac7d5',c2:'#e6f4f1',ax:.012,ay:.008,sp:.24},
    {x:.32,y:.24,r:.32,c1:'#e8cfc0',c2:'#f8e4cf',ax:.009,ay:.011,sp:.2},
    {x:.62,y:.52,r:.34,c1:'#b8dac9',c2:'#edf7ef',ax:.011,ay:.010,sp:.17},
    {x:.18,y:.10,r:.26,c1:'#dfc181',c2:'#fff2c9',ax:.008,ay:.013,sp:.21},
    {x:.70,y:.72,r:.26,c1:'#9fcfc4',c2:'#e9f5ef',ax:.010,ay:.007,sp:.16}
  ];
  function resize(){
    w=canvas.width=window.innerWidth;
    h=canvas.height=window.innerHeight;
  }
  function blob(b,time){
    const px=(b.x+Math.sin(time*b.sp)*b.ax)*w;
    const py=(b.y+Math.cos(time*b.sp*.75)*b.ay)*h;
    const rad=b.r*Math.min(w,h);
    const g=ctx.createRadialGradient(px,py,0,px,py,rad);
    g.addColorStop(0,b.c2+'d8');
    g.addColorStop(.35,b.c1+'82');
    g.addColorStop(.68,b.c1+'30');
    g.addColorStop(1,'transparent');
    ctx.fillStyle=g;
    ctx.beginPath();
    ctx.arc(px,py,rad,0,Math.PI*2);
    ctx.fill();
  }
  function frame(){
    t+=0.008;
    ctx.fillStyle='#f6eedf';
    ctx.fillRect(0,0,w,h);
    ctx.globalCompositeOperation='multiply';
    blobs.forEach(b=>blob(b,t));
    ctx.globalCompositeOperation='source-over';
    const vg=ctx.createRadialGradient(w*.38,h*.76,0,w*.38,h*.76,Math.max(w,h)*.9);
    vg.addColorStop(0,'rgba(255,255,255,.08)');
    vg.addColorStop(.55,'rgba(246,238,223,.18)');
    vg.addColorStop(1,'rgba(246,238,223,.72)');
    ctx.fillStyle=vg;
    ctx.fillRect(0,0,w,h);
    requestAnimationFrame(frame);
  }
  resize();
  window.addEventListener('resize',resize);
  frame();
}
